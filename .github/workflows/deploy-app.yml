name: Build and Deploy ServiceNow App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-tracker-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: project-tracker-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile & Package Scoped App
        run: npx @servicenow/sdk build && npx @servicenow/sdk pack

      - name: Authenticate and Deploy to Instance via Basic Auth
        env:
          NOW_USERNAME: ${{ secrets.NOW_USERNAME }}
          NOW_PASSWORD: ${{ secrets.NOW_PASSWORD }}
          NOW_INSTANCE: ${{ secrets.NOW_INSTANCE_URL }}
        run: |
          npx @servicenow/sdk auth save pipeline_login --type basic --url $NOW_INSTANCE --username $NOW_USERNAME --password $NOW_PASSWORD
          npx @servicenow/sdk deploy --credential pipeline_login
