name: Build and Deploy ServiceNow App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-tracker-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: project-tracker-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile & Package Scoped App
        run: npx @servicenow/sdk build && npx @servicenow/sdk pack

      - name: Deploy App to ServiceNow Instance
        env:
          SN_SDK_NODE_ENV: SN_SDK_CI_INSTALL
          SN_SDK_INSTANCE_URL: ${{ secrets.NOW_INSTANCE_URL }}
          SN_SDK_USER: ${{ secrets.NOW_USERNAME }}
          SN_SDK_USER_PWD: ${{ secrets.NOW_PASSWORD }}
        run: npx @servicenow/sdk install
